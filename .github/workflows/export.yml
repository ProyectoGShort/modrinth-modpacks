name: Export Modrinth packs

on:
  push:
    branches:
      - main
    paths:
      - "modpacks/**"
  workflow_dispatch:
    inputs:
      pack:
        description: "Pack name inside modpacks/ to export (leave empty to export all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packs: ${{ steps.find.outputs.packs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packs
        id: find
        env:
          EVENT: ${{ github.event_name }}
          INPUT_PACK: ${{ inputs.pack && format('modpacks/{0}', inputs.pack) || '' }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: bash scripts/detect-changed-packs.sh

  export:
    needs: detect
    if: ${{ needs.detect.outputs.packs != '[]' && needs.detect.outputs.packs != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pack: ${{ fromJson(needs.detect.outputs.packs) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Get pack metadata
        id: meta
        run: |
          VERSION=$(grep '^version' "${{ matrix.pack }}/pack.toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
          NAME=$(basename "${{ matrix.pack }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versioned=builds/${NAME}-${VERSION}.mrpack" >> "$GITHUB_OUTPUT"
          echo "latest=builds/${NAME}-latest.mrpack" >> "$GITHUB_OUTPUT"

      - name: Export .mrpack
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p builds
          packwiz modrinth export \
            --pack-file "${{ matrix.pack }}/pack.toml" \
            -o "${{ steps.meta.outputs.versioned }}"

      - name: Copy latest
        working-directory: ${{ github.workspace }}
        run: cp "${{ steps.meta.outputs.versioned }}" "${{ steps.meta.outputs.latest }}"

      - name: Commit to repository
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.meta.outputs.versioned }}" "${{ steps.meta.outputs.latest }}"
          git diff --cached --quiet && exit 0
          git commit -m "chore: export ${{ matrix.pack }} v${{ steps.meta.outputs.version }} [skip ci]"
          git pull --rebase --autostash origin main
          git push
